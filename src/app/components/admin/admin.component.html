<div class="admin-container">
    <div class="admin-content">
        <h1>Painel Admin</h1>
        <p class="subtitle">Gerencie as permissões de administrador dos usuários</p>

        <div *ngIf="mensagem" [ngClass]="'mensagem ' + tipoMensagem">{{ mensagem }}</div>

        <div *ngIf="loading" class="loading">Carregando usuários...</div>

        <ul *ngIf="!loading" class="lista">
            <li *ngFor="let user of users" class="item" [class.is-admin]="user.admin">
                <div class="user-info">
                    <div class="user-avatar">{{ user.name.charAt(0).toUpperCase() }}</div>
                    <div class="user-details">
                        <span class="user-name">{{ user.name }}</span>
                        <span class="user-email">{{ user.email }}</span>
                    </div>
                    <span class="badge-admin" *ngIf="user.admin">Admin</span>
                </div>
                <button class="btn-toggle" [class.remover]="user.admin" [disabled]="togglingId === user.id"
                    (click)="toggleAdmin(user)">
                    <span *ngIf="togglingId === user.id" class="spinner"></span>
                    <span *ngIf="togglingId !== user.id">
                        {{ user.admin ? 'Remover Admin' : 'Tornar Admin' }}
                    </span>
                </button>
            </li>
        </ul>

        <div *ngIf="!loading && users.length === 0" class="vazio">Nenhum usuário encontrado.</div>
    </div>
</div>
