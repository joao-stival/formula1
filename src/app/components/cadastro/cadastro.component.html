<div id="home" class="login-container">
    <form class="login-form" [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">
        <h1 class="mb-4">Cadastro</h1>

        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>

            <input type="text" class="form-control" id="nome" placeholder="Seu nome completo" formControlName="nome">

            <ng-container *ngIf="cadastroForm.get('nome')?.invalid && cadastroForm.get('nome')?.touched">
                <small class="mt-1" style="color: rgba(255, 255, 255, 0.856); border-bottom: 1px solid rgb(255, 0, 0);">Nome inválido (mínimo 3 caracteres).</small>
            </ng-container>

        </div>

        <div class="mb-3">
            <label for="dataNascimento" class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" id="dataNascimento" formControlName="dataNascimento">
        </div>

        <div class="mb-3">

                    </ng-container>

                        <span style="color:#a0aec0;">Selecione uma equipe</span>

                <div *ngIf="selectAberto" class="piloto-select section-title">

                        <img [src]="e.logo" width="32" height="32" style="object-fit:contain;">
                        <span [style.color]="e.color">{{ e.team }}</span>

            <label for="phone" class="form-label">Telefone</label>
            <input type="tel" class="form-control" id="phone" placeholder="(00) 00000-0000" formControlName="phone">
        </div>

        <div class="mb-3">
            <label for="staticEmail" class="form-label">Email</label>

            <input type="email" class="form-control" id="staticEmail" placeholder="seu@email.com"
                formControlName="email">

            <ng-container *ngIf="cadastroForm.get('email')?.invalid && cadastroForm.get('email')?.touched">
                <small class="mt-1" style="color: rgba(255, 255, 255, 0.856); border-bottom: 1px solid rgb(255, 0, 0);">Email inválido.</small>
            </ng-container>

        </div>

        <div class="mb-3">
            <label for="inputPassword" class="form-label">Senha</label>

            <input type="password" class="form-control" id="inputPassword" placeholder="Digite sua senha"
                formControlName="senha">

            <ng-container *ngIf="cadastroForm.get('senha')?.invalid && cadastroForm.get('senha')?.touched">
                <small class="mt-1" style="color: rgba(255, 255, 255, 0.856); border-bottom: 1px solid rgb(255, 0, 0);">Senha inválida (mínimo 6 caracteres).</small>
            </ng-container>

        </div>

        <div class="mb-3">
            <label for="inputPasswordConfirm" class="form-label">Confirmar Senha</label>

            <input type="password" class="form-control" id="inputPasswordConfirm" placeholder="Confirme sua senha"
                formControlName="confirmarSenha">

            <ng-container
                *ngIf="cadastroForm.get('confirmarSenha')?.invalid && cadastroForm.get('confirmarSenha')?.touched">
                <small class="mt-1" style="color: rgba(255, 255, 255, 0.856); border-bottom: 1px solid rgb(255, 0, 0);">As senhas não coincidem.</small>
            </ng-container>

        </div>

        <button type="submit" class="btn w-100">Cadastrar</button>
    </form>
</div>
