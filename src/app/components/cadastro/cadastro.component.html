<div id="home" class="login-container">
    <form class="login-form" [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">
        <h1 class="mb-4">Cadastro</h1>

        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>

            <input type="text" class="form-control" id="nome" placeholder="Seu nome completo" formControlName="nome">

             <ng-container *ngIf="cadastroForm.get('nome')?.invalid && cadastroForm.get('nome')?.touched">
                <small style="color: red;">Nome inválido (mínimo 3 caracteres).</small>
            </ng-container>

        </div>

        <div class="mb-3">
            <label for="staticEmail" class="form-label">Email</label>

            <input type="email" class="form-control" id="staticEmail" placeholder="seu@email.com" formControlName="email">

             <ng-container *ngIf="cadastroForm.get('email')?.invalid && cadastroForm.get('email')?.touched">
                <small style="color: red;">Email inválido.</small>
            </ng-container>

        </div>

        <div class="mb-3">
            <label for="inputPassword" class="form-label">Senha</label>

            <input type="password" class="form-control" id="inputPassword" placeholder="Digite sua senha" formControlName="senha">

            <ng-container *ngIf="cadastroForm.get('senha')?.invalid && cadastroForm.get('senha')?.touched">
                <small style="color: red;">Senha inválida (mínimo 6 caracteres).</small>
            </ng-container>

        </div>

        <div class="mb-3">
            <label for="inputPasswordConfirm" class="form-label">Confirmar Senha</label>

            <input type="password" class="form-control" id="inputPasswordConfirm" placeholder="Confirme sua senha" formControlName="confirmarSenha">

            <ng-container *ngIf="cadastroForm.get('confirmarSenha')?.invalid && cadastroForm.get('confirmarSenha')?.touched">
                <small style="color: red;">As senhas não coincidem.</small>
            </ng-container>

        </div>

        <button type="submit" class="btn w-100" style="background-color: red;">Cadastrar</button>
    </form>
</div>
